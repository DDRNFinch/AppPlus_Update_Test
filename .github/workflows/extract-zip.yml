name: Extract and Build Apprentice Plus

on:
  workflow_dispatch:
  push:
    paths:
      - "apprentice-plus.zip"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract uploaded ZIP
        run: |
          set -e
          rm -rf apprentice-plus
          unzip -o apprentice-plus.zip -d .

          if [ ! -f "apprentice-plus/package.json" ]; then
            echo "package.json was not found inside apprentice-plus"
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install project dependencies
        working-directory: apprentice-plus
        run: npm install --legacy-peer-deps

      - name: Install Expo web dependencies
        working-directory: apprentice-plus
        run: |
          npm install react-native-web react-dom @expo/metro-runtime --legacy-peer-deps

      - name: Build Expo web app
        working-directory: apprentice-plus
        env:
          CI: "1"
        run: npx expo export --platform web

      - name: Prepare GitHub Pages folder
        run: |
          set -e
          rm -rf docs
          mkdir -p docs
          cp -R apprentice-plus/dist/. docs/
          touch docs/.nojekyll

      - name: Remove uploaded ZIP
        run: rm -f apprentice-plus.zip

      - name: Commit built website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Build Apprentice Plus website"
          git push
