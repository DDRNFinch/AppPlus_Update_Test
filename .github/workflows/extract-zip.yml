name: Extract and Build Apprentice Plus

on:
  push:
    paths:
      - "apprentice-plus.zip"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          rm -rf apprentice-plus
          unzip -o apprentice-plus.zip -d .

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install project packages
        working-directory: apprentice-plus
        run: npm install

      - name: Install Expo web packages
        working-directory: apprentice-plus
        run: |
          npx expo install react-native-web@~0.19.10
          npx expo install react-dom@18.2.0
          npx expo install @expo/metro-runtime@~3.2.3

      - name: Build web version
        working-directory: apprentice-plus
        env:
          EXPO_PUBLIC_BASE_URL: /Apprentice_Plus_Claude/
        run: npx expo export --platform web

      - name: Prepare GitHub Pages files
        run: |
          rm -rf docs
          mkdir -p docs
          cp -R apprentice-plus/dist/. docs/
          touch docs/.nojekyll

      - name: Remove uploaded ZIP
        run: rm -f apprentice-plus.zip

      - name: Commit website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Build Apprentice Plus website"
          git push
